# FreqTrade Manager Configuration
# All paths are relative to freqtrade_directory unless absolute
# Reload configs are relative to THIS manager's folder
#
# Platform notes:
#   Windows paths use backslashes: "D:\\python\\freqtrade"
#   Linux paths use forward slashes: "/home/user/freqtrade"
#   Executable resolution is automatic (Scripts/*.exe vs bin/*)

freqtrade:
  # Windows example:
  directory: "D:\\python\\freqtrade"
  venv_path: ".venv310"                    # Relative to freqtrade directory
  # Linux example:
  # directory: "/home/user/freqtrade"
  # venv_path: ".venv"

# Multiple strategies supported - each with its own workflow
strategies:
  - name: "Predict_LSTM_Futures"           # Display name / identifier in manager
    strategy_name: "Predict_LSTM_Futures"  # Actual --strategy parameter for freqtrade
    enabled: true

    # Decoupled configs — each freqtrade command uses its own config
    # All paths relative to freqtrade.directory
    trade_config: "user_data/strategies/Predict_LSTM/config.json"
    download_config: "user_data/strategies/Predict_LSTM/config.json"
    backtest_config: "user_data/strategies/Predict_LSTM/config_hyper.json"
    hyperopt_config: "user_data/strategies/Predict_LSTM/config_hyper.json"

    # Config for freqtrade-client reload (relative to THIS manager folder)
    reload_client_config: "Predict_LSTM_Futures_api_client.json"

    # Trade restart mode: "hard" = stop+start, "graceful" = freqtrade-client reload_config
    restart_mode: "graceful"

    # Workflow steps — each can be enabled/disabled independently
    download_data:
      enabled: true
      timeframes: ["3m", "5m", "15m", "30m", "1h", "2h", "4h", "6h", "1d"]
      days_back: 90
      extra_args: ""

    backtest:
      enabled: true
      timerange_start_days_ago: 30
      timerange_end_days_ago: 0
      extra_args: ""
      delete_params_json: false          # Delete <strategy_name>.json before backtest

    hyperopt:
      enabled: true
      timerange_start_days_ago: 30
      timerange_end_days_ago: 0
      loss_function: "SharpeHyperOptLossDaily"
      spaces: "sell"
      epochs: 200
      jobs: 5
      min_trades: 10
      timeframe_detail: "3m"
      disable_param_export: true
      extra_args: ""
      timeout_minutes: 360
      delete_params_json: true          # Delete <strategy_name>.json before hyperopt (recommeded)

    extract:
      enabled: true                        # Enable/disable auto-extraction of best epoch

    restart:
      enabled: true                        # Enable/disable trade restart/reload after workflow

    # Schedule for this strategy's workflow
    schedule:
      enabled: true
      cron: "0 2 * * *"
      interval_hours: 0

    # Epoch selection criteria - evaluated IN ORDER (filter chain)
    epoch_criteria:
      - field: "max_drawdown"
        operator: "<="
        value: 2.0
      - field: "profit_total_pct"
        operator: ">="
        value: 0
        sort: "desc"

    trade_extra_args: ""

# Web interface
web:
  host: "0.0.0.0"
  port: 42000

# Logging
logging:
  level: "INFO"
  file: "freqtrade_manager.log"
  max_bytes: 10485760
  backup_count: 5

# Hyperopt monitoring
monitoring:
  poll_interval: 3
  max_errors: 10

# Process stats collection interval (seconds)
process_stats_interval: 2
